# nginx reverse proxy — YAAMon at a sub-path of an existing virtual host
# (e.g. https://example.com/yaamon/)
#
# YAAMon config.yaml — base_path must match the location block prefix:
#   server:
#     bind_address: 127.0.0.1
#     http_port: 8081
#     base_path: /yaamon
#   tls:
#     mode: disabled   # nginx handles TLS
#
# Add the location block to your existing server {} block.

server {
    listen 443 ssl;
    http2 on;
    server_name example.com;

    # ... existing TLS, root, and other location blocks ...

    location /yaamon/ {
        proxy_pass         http://127.0.0.1:8081/yaamon/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (SSE dashboard updates).
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }
}
