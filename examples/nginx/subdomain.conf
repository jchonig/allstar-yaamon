# nginx reverse proxy — YAAMon on a dedicated subdomain
# (e.g. https://yaamon.example.com/)
#
# YAAMon config.yaml:
#   server:
#     bind_address: 127.0.0.1
#     http_port: 8080
#   tls:
#     mode: disabled   # nginx handles TLS
#
# Replace yaamon.example.com with your actual domain.
# Obtain a certificate: certbot --nginx -d yaamon.example.com

server {
    listen 80;
    server_name yaamon.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name yaamon.example.com;

    ssl_certificate     /etc/letsencrypt/live/yaamon.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yaamon.example.com/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (SSE dashboard updates).
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }
}
