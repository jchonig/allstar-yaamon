# YAAMon reverse-proxy — subfolder on existing site (ASL3 coexistence)
#
# Mounts YAAMon at /yaamon/ alongside the existing ASL3/Apache site.
# YAAMon answers at http://<node-ip>/yaamon/
#
# Enable:
#   sudo a2enmod proxy proxy_http
#   sudo a2enconf yaamon-subfolder
#   sudo systemctl reload apache2
#
# config.yaml — must set base_path to match:
#   server:
#     bind_address: 127.0.0.1
#     http_port: 8080
#     base_path: /yaamon

Redirect permanent /yaamon /yaamon/

ProxyPreserveHost On
ProxyPass        /yaamon/ http://127.0.0.1:8080/yaamon/ flushpackets=on
ProxyPassReverse /yaamon/ http://127.0.0.1:8080/yaamon/
