# YAAMon reverse-proxy — dedicated subdomain
#
# Serves YAAMon at http://yaamon.example.com/ (or your chosen hostname).
# Replace "yaamon.example.com" with your actual domain before enabling.
#
# Enable:
#   sudo a2enmod proxy proxy_http
#   sudo a2enconf yaamon-subdomain
#   sudo systemctl reload apache2
#
# For HTTPS, run certbot after enabling:
#   sudo certbot --apache -d yaamon.example.com
#
# config.yaml — no base_path needed, but bind to loopback:
#   server:
#     bind_address: 127.0.0.1
#     http_port: 8080
#     # tls.mode: disabled  (Apache handles TLS)

<VirtualHost *:80>
    ServerName yaamon.example.com

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8080/ flushpackets=on
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog  ${APACHE_LOG_DIR}/yaamon-error.log
    CustomLog ${APACHE_LOG_DIR}/yaamon-access.log combined
</VirtualHost>
