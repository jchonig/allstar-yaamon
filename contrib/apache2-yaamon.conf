# Apache reverse-proxy configuration for YAAMon
#
# Installation (Debian/Ubuntu):
#   sudo a2enmod proxy proxy_http
#   sudo cp /usr/share/doc/yaamon/apache2-yaamon.conf /etc/apache2/conf-available/yaamon.conf
#   # Edit the file to choose root or subfolder variant, then:
#   sudo a2enconf yaamon
#   sudo systemctl reload apache2
#
# YAAMon must be configured to listen on 127.0.0.1 only:
#   server:
#     bind_address: 127.0.0.1
#     http_port: 8080
#
# Choose ONE of the two variants below.

# ---------------------------------------------------------------------------
# Variant 1: YAAMon at the root of the virtual host (http://<host>/)
#
# Use this when Apache serves yaamon.example.com or when you want yaamon
# to answer all requests at the top-level path.
#
# config.yaml — no base_path needed:
#   server:
#     bind_address: 127.0.0.1
#     http_port: 8080
# ---------------------------------------------------------------------------
# ProxyPreserveHost On
# ProxyPass        / http://127.0.0.1:8080/
# ProxyPassReverse / http://127.0.0.1:8080/

# ---------------------------------------------------------------------------
# Variant 2: YAAMon at a sub-path (http://<host>/yaamon/)
#
# Use this when Apache already serves other content at the root (e.g. the
# ASL3/Asterisk status page) and you want YAAMon under /yaamon.
#
# config.yaml — must set base_path to match:
#   server:
#     bind_address: 127.0.0.1
#     http_port: 8081        # use a different port from variant 1
#     base_path: /yaamon
# ---------------------------------------------------------------------------
# ProxyPreserveHost On
# ProxyPass        /yaamon/ http://127.0.0.1:8081/yaamon/
# ProxyPassReverse /yaamon/ http://127.0.0.1:8081/yaamon/
