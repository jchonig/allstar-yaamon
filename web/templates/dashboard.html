{{template "base" .}}

{{define "title"}}Dashboard — YAAMon{{end}}

{{define "nav-extra"}}
<span class="text-muted small">
  {{.Username}}
  <span class="badge bg-secondary ms-1">{{.Permission}}</span>
</span>
<a href="/logout" class="btn btn-sm btn-outline-secondary">Sign out</a>
{{end}}

{{define "content"}}
<div class="row">
  <div class="col">
    <h5 class="mb-3">Dashboard</h5>
    <div class="alert alert-info">
      <i class="bi bi-info-circle me-2"></i>
      Welcome, <strong>{{.Username}}</strong>. Node management and favorites will appear here once configured.
    </div>
  </div>
</div>
{{end}}
