{{template "base" .}}

{{define "title"}}Setup — YAAMon{{end}}

{{define "content"}}
<div class="row justify-content-center mt-5">
  <div class="col-sm-8 col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-1">
          <i class="bi bi-broadcast-pin me-2"></i>YAAMon
        </h4>
        <p class="text-muted text-center mb-4">Create your admin account</p>

        {{if .Error}}
        <div class="alert alert-danger py-2">{{.Error}}</div>
        {{end}}

        <form method="POST" action="{{.BasePath}}/setup">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   value="admin" autocomplete="username" autofocus required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   autocomplete="new-password" required minlength="8">
            <div class="form-text">Minimum 8 characters</div>
          </div>
          <div class="mb-3">
            <label for="confirm" class="form-label">Confirm password</label>
            <input type="password" class="form-control" id="confirm" name="confirm"
                   autocomplete="new-password" required minlength="8">
          </div>
          <button type="submit" class="btn btn-primary w-100">Create admin account</button>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
