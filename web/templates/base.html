{{define "base"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}YAAMon{{end}}</title>
  <script>
    (function() {
      var t = localStorage.getItem('yaamon_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-yaamon">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/dashboard">
        <i class="bi bi-broadcast-pin me-1"></i>YAAMon
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        {{block "nav-extra" .}}{{end}}
        <button class="btn btn-sm btn-outline-secondary" id="themeToggle" title="Toggle theme">
          <i class="bi bi-circle-half"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-3">
    {{block "content" .}}{{end}}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/app.js"></script>
  {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
