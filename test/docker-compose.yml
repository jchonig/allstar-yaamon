# Development compose file.
# Usage:  make run     — start in background (builds image first)
#         make stop    — stop and remove the container
#         make logs    — follow container logs
#         make watch   — foreground watch mode; rebuilds image on source changes,
#                        or run 'make compile' in a second terminal for a faster
#                        binary-only swap without a full image rebuild.

services:
  yaamon:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./config:/etc/yaamon:ro
      - ./data:/var/lib/yaamon
    environment:
      YAAMON_STATE_FILE: /etc/yaamon/state.yaml
      TEST_ADMIN_PASSWORD: ${TEST_ADMIN_PASSWORD:-testpassword}
      TEST_VIEWER_PASSWORD: ${TEST_VIEWER_PASSWORD:-viewerpassword}
    develop:
      watch:
        # Rebuild the image when Go sources or templates change (automatic, slower).
        - action: rebuild
          path: ../
          ignore:
            - test/
            - integration_tests/
            - e2e/
            - .git/
            - docs/
            - "*.md"
            - "**/*_test.go"
        # Fast binary swap: run 'make compile' to trigger without a full image rebuild.
        - action: sync+restart
          path: ./yaamon
          target: /usr/local/bin/yaamon
        # Restart when config changes — bind mount already delivers the file.
        - action: restart
          path: ./config
