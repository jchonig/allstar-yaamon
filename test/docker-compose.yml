# Development compose file.
# Usage:  make run        — start in background (builds image first)
#         make stop       — stop and remove the container
#         make logs       — follow container logs
#         docker compose -f test/docker-compose.yml watch  — foreground with auto-rebuild

services:
  yaamon:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./config:/etc/yaamon:ro
      - ./data:/var/lib/yaamon
    environment:
      YAAMON_STATE_FILE: /etc/yaamon/state.yaml
      TEST_ADMIN_PASSWORD: ${TEST_ADMIN_PASSWORD:-testpassword}
      TEST_VIEWER_PASSWORD: ${TEST_VIEWER_PASSWORD:-viewerpassword}
    develop:
      watch:
        # Sync the pre-compiled linux binary and restart (fast; run 'make compile' to trigger).
        - action: sync+restart
          path: ./yaamon
          target: /usr/local/bin/yaamon
        # Sync config/state files and restart (re-runs entrypoint / yaamon apply).
        - action: sync+restart
          path: ./config
          target: /etc/yaamon
