name: Branch image
on:
  push:
    branches-ignore:
      - main

permissions:
  packages: write

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build snapshot .deb (amd64 + arm64, skip Docker)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload arm64 .deb
        uses: actions/upload-artifact@v4
        with:
          name: yaamon-arm64-deb
          path: dist/*_linux_arm64.deb
          retention-days: 14
      - name: Upload amd64 .deb
        uses: actions/upload-artifact@v4
        with:
          name: yaamon-amd64-deb
          path: dist/*_linux_amd64.deb
          retention-days: 14
      - name: Upload arm64 binary tarball
        uses: actions/upload-artifact@v4
        with:
          name: yaamon-arm64-tar
          path: dist/*-linux-arm64.tar.gz
          retention-days: 14
      - name: Upload amd64 binary tarball
        uses: actions/upload-artifact@v4
        with:
          name: yaamon-amd64-tar
          path: dist/*-linux-amd64.tar.gz
          retention-days: 14

  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: tag
        run: |
          branch="${{ github.ref_name }}"
          branch="${branch//\//-}"
          short="${{ github.sha }}"
          short="${short:0:7}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "sha=$branch-$short" >> "$GITHUB_OUTPUT"
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            REPO_URL=https://github.com/jchonig/allstar-yaamon
          tags: |
            ghcr.io/jchonig/yaamon:${{ steps.tag.outputs.branch }}
            ghcr.io/jchonig/yaamon:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
