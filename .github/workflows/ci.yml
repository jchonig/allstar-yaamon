name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Unit tests run inside Docker via `make test-unit` — same as local dev.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests
        run: make test-unit

  # Verify the Docker image builds for both target architectures.
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build multi-arch image (verify, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: yaamon:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Integration tests: build the amd64 image and run the test suite against it.
  # Uses `make test-integration` which manages Docker networking internally.
  integration:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - name: Build test image (amd64)
        run: make build
      - name: Run integration tests
        run: make test-integration
