name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  # Build the snapshot .deb and run integration tests against it before publishing.
  # This catches goreleaser config regressions with the actual release artifacts.
  test-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build snapshot (deb only, skip Docker)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run integration tests against .deb
        run: make test-deb-integration

  goreleaser:
    runs-on: ubuntu-latest
    needs: test-deb
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # required for changelog generation
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install MkDocs Material
        run: pip install mkdocs-material
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set release notes flag
        id: relnotes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "flag=--release-notes=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean ${{ steps.relnotes.outputs.flag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create APT repository
        id: apt-repo
        if: "!contains(github.ref_name, '-')"
        uses: morph027/apt-repo-action@v3
        with:
          repo-name: yaamon
          scan-dir: ./dist
          codename: stable
          architectures: amd64 arm64
          components: main
          signing-key: ${{ secrets.APT_SIGNING_KEY }}
          import-from-repo-url: https://yaamon.n2vlv.net/debian
          import-from-repo-failure-allow: true
      - name: Build MkDocs site
        if: "!contains(github.ref_name, '-')"
        run: mkdocs build
      - name: Merge APT repository into MkDocs site
        if: "!contains(github.ref_name, '-')"
        run: mkdir -p site/debian && cp -r ${{ steps.apt-repo.outputs.dir }}/. site/debian/
      - name: Add CNAME for custom domain
        if: "!contains(github.ref_name, '-')"
        run: echo "yaamon.n2vlv.net" > site/CNAME
      - if: "!contains(github.ref_name, '-')"
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - name: Deploy to GitHub Pages
        id: deploy-pages
        if: "!contains(github.ref_name, '-')"
        uses: actions/deploy-pages@v4

  test-website:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: "!contains(github.ref_name, '-')"
    steps:
      - name: Wait for Pages to propagate
        run: sleep 30
      - name: Check site pages
        run: |
          BASE=https://yaamon.n2vlv.net
          check() {
            STATUS=$(curl -o /dev/null -sw "%{http_code}" "$1")
            echo "$STATUS  $1"
            [[ "$STATUS" == "200" ]] || { echo "FAIL: expected 200"; exit 1; }
          }
          check "$BASE/"
          check "$BASE/installation/deb/"
          check "$BASE/configuration/"
          check "$BASE/user-guide/"
      - name: Check APT repo files still accessible
        run: |
          BASE=https://yaamon.n2vlv.net
          check() {
            STATUS=$(curl -o /dev/null -sw "%{http_code}" "$1")
            echo "$STATUS  $1"
            [[ "$STATUS" == "200" ]] || { echo "FAIL: expected 200"; exit 1; }
          }
          check "$BASE/debian/gpg.key"
          check "$BASE/debian/dists/stable/InRelease"
          check "$BASE/debian/dists/stable/main/binary-amd64/Packages"

  test-apt-repo:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: "!contains(github.ref_name, '-')"
    steps:
      - name: Wait for Pages to propagate
        run: sleep 30
      - name: Install signing key
        run: |
          curl -fsSL https://yaamon.n2vlv.net/debian/gpg.key \
            | sudo gpg --no-default-keyring \
                --keyring gnupg-ring:/usr/share/keyrings/yaamon-archive-keyring.gpg \
                --import
          sudo chmod 644 /usr/share/keyrings/yaamon-archive-keyring.gpg
      - name: Add APT repository
        run: |
          echo "deb [signed-by=/usr/share/keyrings/yaamon-archive-keyring.gpg] https://yaamon.n2vlv.net/debian stable main" \
            | sudo tee /etc/apt/sources.list.d/yaamon.list
      - name: Install yaamon from APT repository
        run: |
          sudo apt-get update -q
          sudo apt-get install -y yaamon
      - name: Verify installation
        run: dpkg -s yaamon | grep -E '^(Package|Version|Status)'
