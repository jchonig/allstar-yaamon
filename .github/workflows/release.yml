name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write     # required to push images to ghcr.io

jobs:
  # Build the snapshot .deb and run integration tests against it before publishing.
  # This catches goreleaser config regressions with the actual release artifacts.
  test-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build snapshot (deb only, skip Docker)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run integration tests against .deb
        run: make test-deb-integration

  goreleaser:
    runs-on: ubuntu-latest
    needs: test-deb
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # required for changelog generation
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set release notes flag
        id: relnotes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "flag=--release-notes=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean ${{ steps.relnotes.outputs.flag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
